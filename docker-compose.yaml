services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./db:/db
    restart: unless-stopped
    # Disable IPv6 inside the container's network namespace. Several feeds
    # (e.g. exakat.io) advertise AAAA records that don't route from this
    # host, causing the resolver to try IPv6 first and hang until the fetch
    # timeout fires. With v6 off the resolver only ever uses A records.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    healthcheck:
      test: ["CMD", "deno", "eval", "const r = await fetch('http://localhost:8021/health'); if (!r.ok) Deno.exit(1);"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  caddy:
    container_name: blogflock-caddy
    image: caddy:2-alpine
    ports:
      - "8021:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: blogflock-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5400:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
